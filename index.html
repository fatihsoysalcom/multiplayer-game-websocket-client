<!DOCTYPE html>
<html>
<head>
    <title>Multiplayer WebSocket Client</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin-top: 20px; }
        h1 { color: #333; }
        #game-area { width: 400px; height: 300px; border: 2px solid #333; background-color: #f0f0f0; position: relative; overflow: hidden; margin-bottom: 10px; }
        .player { position: absolute; width: 20px; height: 20px; background-color: blue; border-radius: 50%; text-align: center; line-height: 20px; color: white; font-size: 10px; border: 1px solid #fff; box-sizing: border-box; }
        #messages { width: 400px; height: 150px; border: 1px solid #ccc; margin-top: 10px; padding: 5px; overflow-y: scroll; background-color: #e9e9e9; font-size: 0.9em; color: #555; }
        button { margin: 5px; padding: 10px 20px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 5px; font-size: 1em; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <h1>Multiplayer WebSocket Client</h1>
    <div id="game-area">
        <!-- Player elements will be added here by JavaScript -->
    </div>
    <div>
        <button onclick="sendMove('up')">Move Up</button>
        <button onclick="sendMove('down')">Move Down</button>
        <button onclick="sendMove('left')">Move Left</button>
        <button onclick="sendMove('right')">Move Right</button>
    </div>
    <div id="messages"></div>

    <script>
        const gameArea = document.getElementById('game-area');
        const messagesDiv = document.getElementById('messages');
        const WS_URL = 'ws://localhost:8765'; // WebSocket server URL

        let ws;
        let players = {}; // Stores player states: {id: {x, y, element}}
        let myPlayerId = null;

        function logMessage(msg) {
            const p = document.createElement('p');
            p.textContent = msg;
            messagesDiv.appendChild(p);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function connectWebSocket() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                logMessage('Already connected.');
                return;
            }

            ws = new WebSocket(WS_URL);

            ws.onopen = () => {
                logMessage('Connected to WebSocket server.');
                // Limn Engine would typically initialize game state here, perhaps requesting a player ID or initial world data.
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                // This is where Limn Engine processes real-time game updates received from the server.
                if (data.type === 'init') {
                    myPlayerId = data.id;
                    logMessage(`My player ID: ${myPlayerId}`);
                    // Initialize all players received from server
                    for (const playerId in data.players) {
                        createOrUpdatePlayer(playerId, data.players[playerId].x, data.players[playerId].y);
                    }
                } else if (data.type === 'player_update') {
                    // Update a specific player's position based on server data.
                    createOrUpdatePlayer(data.id, data.x, data.y);
                } else if (data.type === 'player_joined') {
                    logMessage(`Player ${data.id} joined.`);
                    createOrUpdatePlayer(data.id, data.x, data.y);
                } else if (data.type === 'player_left') {
                    logMessage(`Player ${data.id} left.`);
                    removePlayer(data.id);
                } else if (data.type === 'message') {
                    logMessage(`Server: ${data.content}`);
                }
            };

            ws.onclose = () => {
                logMessage('Disconnected from WebSocket server. Attempting to reconnect in 3 seconds...');
                // Limn Engine might handle game pause, re-connection attempts, or display a disconnected state.
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = (error) => {
                logMessage('WebSocket error: ' + error.message);
                // Limn Engine error handling for network issues.
            };
        }

        function createOrUpdatePlayer(id, x, y) {
            let playerElement = players[id] ? players[id].element : null;

            if (!playerElement) {
                playerElement = document.createElement('div');
                playerElement.classList.add('player');
                playerElement.textContent = id === myPlayerId ? 'Me' : id.substring(0, 2); // Display 'Me' or first 2 chars of ID
                playerElement.style.backgroundColor = id === myPlayerId ? 'red' : 'blue';
                gameArea.appendChild(playerElement);
                players[id] = { x, y, element: playerElement };
            }

            // Limn Engine would update the internal player position and render it on screen.
            playerElement.style.left = `${x}px`;
            playerElement.style.top = `${y}px`;
            players[id].x = x;
            players[id].y = y;
        }

        function removePlayer(id) {
            if (players[id]) {
                gameArea.removeChild(players[id].element);
                delete players[id];
            }
        }

        function sendMove(direction) {
            if (ws && ws.readyState === WebSocket.OPEN && myPlayerId) {
                // Limn Engine would capture player input and send it to the server via WebSocket.
                ws.send(JSON.stringify({ type: 'move', id: myPlayerId, direction: direction }));
                logMessage(`Sent move: ${direction}`);
            } else {
                logMessage('Not connected or player ID not set. Please wait for connection.');
            }
        }

        // Initial connection attempt when the page loads.
        connectWebSocket();
    </script>
</body>
</html>
